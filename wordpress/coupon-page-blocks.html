<!-- ============ 【BLOCK 1】カスタムHTML(ショートコードの上) ============ -->

<style>
/* 全画面オーバーレイ: ページ側がどうなっていても独立してスクロールできる */
.tafx{
  position: fixed; inset: 0; z-index: 999999;
  background: #faf7f0;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  font-family: "Yu Mincho","YuMincho","Hiragino Mincho ProN",serif;
  line-height: 1.9;
}
.tafx-in{ max-width: 480px; margin: 0 auto; padding: 0 0 60px; }

/* コンパクトなヘッダー(すぐ下がフォーム) */
.tafx-head{
  background: linear-gradient(165deg,#1b2a4a,#101c34);
  color:#fff; text-align:center; padding: 24px 20px 22px;
}
.tafx-badge{
  display:inline-block; background:#b03a3a; color:#fff;
  font-size:13px; font-weight:700; padding:5px 16px; border-radius:6px;
}
.tafx-head h1{ font-size:19px; color:#fff; margin:12px 0 0; font-weight:700; line-height:1.6; }
.tafx-head h1 b{ color:#e5cf8f; }

/* CF7フォーム */
.tafx .wpcf7{ padding: 20px 26px 0; }
.tafx .wpcf7 form > p, .tafx .wpcf7 label{
  display:block; font-size:14px; color:#1b2a4a; font-weight:700; margin-bottom:14px;
}
.tafx .wpcf7 input[type="text"],
.tafx .wpcf7 input[type="email"]{
  width:100%; font-size:16px; padding:15px; margin-top:6px;
  border:1.5px solid #c9bfa4; border-radius:10px; background:#fff; box-sizing:border-box;
}
.tafx .wpcf7 input:focus{ outline:none; border-color:#c9a54a; box-shadow:0 0 0 3px rgba(201,165,74,.18); }
.tafx .wpcf7 input[type="submit"]{
  width:100%; border:none; cursor:pointer; margin-top:8px; padding:18px;
  background:linear-gradient(180deg,#d8b45a,#c9a54a); color:#101c34;
  font-size:18px; font-weight:700; border-radius:999px;
  box-shadow:0 6px 18px rgba(201,165,74,.45); font-family:inherit;
}
.tafx .wpcf7 input[type="submit"]:active{ transform:scale(.98); }
.tafx .wpcf7 .wpcf7-spinner{ display:block; margin:8px auto; }
</style>

<div class="tafx">
  <div class="tafx-in">
    <div class="tafx-head">
      <span class="tafx-badge">🎁 5,000円OFFクーポン</span>
      <h1>メールに<b>その場でコード</b>が届きます</h1>
    </div>
<!-- ↑閉じタグはBLOCK 3にあります。このままでOK -->
